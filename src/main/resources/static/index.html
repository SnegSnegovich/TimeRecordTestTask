<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Time Logger</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #0d0f12;
      --surface:   #141720;
      --border:    #1f2433;
      --accent:    #4ade99;
      --accent-dim:#1a4d38;
      --muted:     #3a4155;
      --text:      #c8d0e0;
      --text-dim:  #5a6480;
      --error:     #f87171;
      --warn:      #fbbf24;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 18px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: .18em;
      text-transform: uppercase;
      color: var(--accent);
    }

    .divider { color: var(--muted); }

    .tagline {
      font-size: 11px;
      color: var(--text-dim);
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 300;
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    /* live indicator */
    .live-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: var(--text-dim);
    }
    .live-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 2s infinite;
    }
    .live-dot.error { background: var(--error); animation: none; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .3; }
    }

    .refresh-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      padding: 5px 12px;
      cursor: pointer;
      letter-spacing: .08em;
      transition: border-color .15s, color .15s;
    }
    .refresh-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ── Stats bar ── */
    .stats {
      padding: 14px 32px;
      display: flex;
      gap: 32px;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .stat { display: flex; flex-direction: column; gap: 3px; }
    .stat-label { font-size: 9px; letter-spacing: .14em; text-transform: uppercase; color: var(--text-dim); }
    .stat-value { font-size: 20px; font-weight: 500; color: var(--accent); line-height: 1; }
    .stat-value.muted { color: var(--text-dim); font-size: 13px; }

    /* ── Main ── */
    main {
      flex: 1;
      padding: 24px 32px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .table-header {
      display: grid;
      grid-template-columns: 40px 1fr 1fr;
      gap: 12px;
      padding: 0 12px 8px;
      border-bottom: 1px solid var(--border);
      font-size: 9px;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    /* scrollable list */
    .list-wrap {
      overflow-y: auto;
      max-height: calc(100vh - 260px);
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    /* thin scrollbar */
    .list-wrap::-webkit-scrollbar { width: 4px; }
    .list-wrap::-webkit-scrollbar-track { background: transparent; }
    .list-wrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .row {
      display: grid;
      grid-template-columns: 40px 1fr 1fr;
      gap: 12px;
      padding: 8px 12px;
      border-radius: 3px;
      transition: background .1s;
      animation: fadeIn .25s ease;
    }
    .row:hover { background: var(--surface); }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(-4px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .row-new { background: var(--accent-dim); }

    .row-num { color: var(--muted); text-align: right; }
    .row-date { color: var(--text-dim); }
    .row-time { color: var(--text); }

    /* ── Status messages ── */
    .status-msg {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 3px;
      font-size: 12px;
    }
    .status-msg.error   { background: #1f0f0f; color: var(--error); border-left: 2px solid var(--error); }
    .status-msg.loading { color: var(--text-dim); }
    .status-msg.empty   { color: var(--text-dim); }

    /* ── Footer ── */
    footer {
      padding: 12px 32px;
      border-top: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text-dim);
      background: var(--surface);
    }
  </style>
</head>
<body>

<header>
  <span class="logo">Time Logger</span>
  <span class="divider">/</span>
  <span class="tagline">chronological write log</span>
  <div class="header-right">
    <div class="live-badge">
      <div class="live-dot" id="liveDot"></div>
      <span id="liveLabel">live</span>
    </div>
    <button class="refresh-btn" onclick="fetchTimes()">↺ refresh</button>
  </div>
</header>

<div class="stats">
  <div class="stat">
    <span class="stat-label">Total records</span>
    <span class="stat-value" id="statTotal">—</span>
  </div>
  <div class="stat">
    <span class="stat-label">Latest entry</span>
    <span class="stat-value muted" id="statLatest">—</span>
  </div>
  <div class="stat">
    <span class="stat-label">Last fetch</span>
    <span class="stat-value muted" id="statFetch">—</span>
  </div>
  <div class="stat">
    <span class="stat-label">Status</span>
    <span class="stat-value muted" id="statStatus">connecting…</span>
  </div>
</div>

<main>
  <div class="table-header">
    <span>#</span>
    <span>Date</span>
    <span>Time</span>
  </div>

  <div class="list-wrap" id="list">
    <div class="status-msg loading">⌛ Loading…</div>
  </div>
</main>

<footer>
  <span>GET /api/v1/times</span>
  <span id="footerInterval">auto-refresh every 2s</span>
</footer>

<script>
  const API = '/api/v1/times';
  const INTERVAL_MS = 2000;

  let previousCount = 0;
  let failCount = 0;

  function pad(n) { return String(n).padStart(2, '0'); }

  function formatDateTime(raw) {
    // LocalDateTime arrives as [2024,1,15,10,30,45,123000000] or "2024-01-15T10:30:45"
    let date, time;
    if (Array.isArray(raw)) {
      const [y, mo, d, h, m, s] = raw;
      date = `${y}-${pad(mo)}-${pad(d)}`;
      time = `${pad(h)}:${pad(m)}:${pad(s)}`;
    } else {
      const str = String(raw);
      const [d, t] = str.includes('T') ? str.split('T') : str.split(' ');
      date = d;
      time = t ? t.substring(0, 8) : '—';
    }
    return { date, time };
  }

  async function fetchTimes() {
    try {
      const res = await fetch(API);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      failCount = 0;
      renderList(data);
    } catch (e) {
      failCount++;
      setError(`Cannot reach API: ${e.message}`);
    }
  }

  function renderList(data) {
    const list = document.getElementById('list');
    const isNewData = data.length !== previousCount;

    // Stats
    document.getElementById('statTotal').textContent = data.length;
    document.getElementById('statFetch').textContent = new Date().toLocaleTimeString();
    document.getElementById('statStatus').textContent = 'ok';

    if (data.length === 0) {
      list.innerHTML = '<div class="status-msg empty">No records yet.</div>';
      document.getElementById('statLatest').textContent = '—';
      setLive(true);
      previousCount = 0;
      return;
    }

    const latest = formatDateTime(data[data.length - 1]);
    document.getElementById('statLatest').textContent = `${latest.date} ${latest.time}`;
    setLive(true);

    // Only re-render if data changed — avoids scroll jump on every tick
    if (!isNewData) return;

    const wasAtBottom = isScrolledToBottom(list);

    list.innerHTML = '';
    data.forEach((raw, i) => {
      const { date, time } = formatDateTime(raw);
      const isNew = i >= previousCount;
      const row = document.createElement('div');
      row.className = 'row' + (isNew ? ' row-new' : '');
      row.innerHTML = `
        <span class="row-num">${i + 1}</span>
        <span class="row-date">${date}</span>
        <span class="row-time">${time}</span>`;
      list.appendChild(row);

      // Remove highlight after animation
      if (isNew) setTimeout(() => row.classList.remove('row-new'), 800);
    });

    if (wasAtBottom || previousCount === 0) {
      list.scrollTop = list.scrollHeight;
    }

    previousCount = data.length;
  }

  function isScrolledToBottom(el) {
    return el.scrollHeight - el.scrollTop - el.clientHeight < 40;
  }

  function setError(msg) {
    setLive(false);
    document.getElementById('statStatus').textContent = 'error';
    if (failCount === 1) {
      const list = document.getElementById('list');
      const err = document.createElement('div');
      err.className = 'status-msg error';
      err.textContent = `⚠ ${msg}`;
      list.prepend(err);
    }
  }

  function setLive(ok) {
    const dot = document.getElementById('liveDot');
    const label = document.getElementById('liveLabel');
    dot.className = 'live-dot' + (ok ? '' : ' error');
    label.textContent = ok ? 'live' : 'offline';
  }

  // Start
  fetchTimes();
  setInterval(fetchTimes, INTERVAL_MS);
</script>
</body>
</html>
